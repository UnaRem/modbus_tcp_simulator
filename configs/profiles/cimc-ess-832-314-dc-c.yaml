profiles:
  cimc-ess-832-314-dc-c:
    description: "来源: docs/设备数据点表/cimc-ess-832-314-dc-c.md"
    registers:
      - address: 8193
        name: "Rack运行状态"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "0: 正常（电池簇主回路继电器闭合，充电和放电功率不为0）;       1: 禁充（电池簇主回路继电器闭合，允许充电功率为0）;      2: 禁放（电池簇主回路继电器闭合，允许放电功率为0）;       3: 待机（电池簇主回路继电器闭合，充电和放电功率均为0）;                        4: 停机（电池簇主回路继电器断开，充电和放电功率均为0）;"
      - address: 8194
        name: "Rack预充电阶段"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "0：断网（主正、主负、预充断开）      1：启动并网（预充闭合、主负，断开主正）      2：并网中（预充和主正、主负闭合）      3：并网成功（预充断开，主正、主负闭合）      4：并网失败（预充失败后发送此状态）"
      - address: 8195
        name: "Rack接触器状态"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "0x0: 断开, 0x1: 闭合;"
        bits:
          0: "主接触状态"
          1: "预充接触器状态"
          2: "主负接触状态"
          3: "隔离开关状态"
      - address: 8196
        name: "Rack故障"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "Bit0：BMU初始化故障；      Bit1：BCU初始化故障；      Bit2：若有熔断器状态检测，则真实反馈；若无熔断器状态检测，默认发0；      Bit3：总正/总负继电器粘连状态上报；      Bit4：BMU与BCU之间的主从通讯内网故障；      Bit5:   默认发0；      Bit6:   电流采集异常，或电流传感器故障；      Bit7:   报绝缘故障      Bit8:   隔离开关在断开情况下，此位置发1；"
        bits:
          0: "BMU硬件故障"
          1: "BCU硬件故障"
          2: "熔断器故障"
          3: "接触器粘连故障"
          4: "BMU通信故障"
          5: "BAU通信故障"
          6: "电流传感器故障"
          7: "绝缘监测设备故障"
          8: "隔开开关异常断开"
          9: "----预充故障"
          10: "----总压压差故障"
          11: "----热失控故障"
          12: "----环境温度高温"
          13: "----电流异常"
          14: "---供电电压异常"
          15: "---BMS断继电器故障总标志位"
      - address: 8197
        name: "Rack一级报警"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "Bit11:   若无极柱温度采集时，默认发送正常；若有极柱温度采集，请按照BMS技术协议规定的触发条件发送。      Bit12: 若无高压连接器温度采集时，默认发送正常；若有高压连接器温度采集，请按照BMS技术协议规定的触发条件发送。"
        bits:
          0: "总电压过压一级报警"
          1: "总电压欠压一级报警"
          2: "单体过压一级报警"
          3: "单体欠压一级报警"
          4: "放电电流过大一级报警"
          5: "充电电流过大一级报警"
          6: "放电电池过温一级报警"
          7: "放电电池欠温一级报警"
          8: "充电电池过温一级报警"
          9: "充电电池欠温一级报警"
          10: "绝缘阻值过低一级报警"
          11: "极柱温度过高一级报警"
          12: "高压箱连接器温度过高一级报警"
          13: "单体压差过高一级报警"
          14: "单体温差过高一级报警"
          15: "SOC低一级报警"
      - address: 8198
        name: "Rack二级报警"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "Bit11:   若无极柱温度采集时，默认发送正常；若有极柱温度采集，请按照BMS技术协议规定的触发条件发送。      Bit12: 若无高压连接器温度采集时，默认发送正常；若有高压连接器温度采集，请按照BMS技术协议规定的触发条件发送。"
        bits:
          0: "总电压过压二级报警"
          1: "总电压欠压二级报警"
          2: "单体过压二级报警"
          3: "单体欠压二级报警"
          4: "放电电流过大二级报警"
          5: "充电电流过大二级报警"
          6: "放电电池过温二级报警"
          7: "放电电池欠温二级报警"
          8: "充电电池过温二级报警"
          9: "充电电池欠温二级报警"
          10: "绝缘阻值过低二级报警"
          11: "极柱温度过高二级报警"
          12: "高压箱连接器温度过高二级报警"
          13: "单体压差过高二级报警"
          14: "单体温差过高二级报警"
          15: "SOC低二级报警"
      - address: 8199
        name: "Rack三级报警"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "Bit11:   若无极柱温度采集时，默认发送正常；若有极柱温度采集，请按照BMS技术协议规定的触发条件发送。      Bit12: 若无高压连接器温度采集时，默认发送正常；若有高压连接器温度采集，请按照BMS技术协议规定的触发条件发送。"
        bits:
          0: "总电压过压三级报警"
          1: "总电压欠压三级报警"
          2: "单体过压三级报警"
          3: "单体欠压三级报警"
          4: "放电电流过大三级报警"
          5: "充电电流过大三级报警"
          6: "放电电池过温三级报警"
          7: "放电电池欠温三级报警"
          8: "充电电池过温三级报警"
          9: "充电电池欠温三级报警"
          10: "绝缘阻值过低三级报警"
          11: "极柱温度过高三级报警"
          12: "高压箱连接器温度过高三级报警"
          13: "单体压差过高三级报警"
          14: "单体温差过高三级报警"
          15: "SOC低三级报警"
      - address: 8200
        name: "Rack切入失败原因"
        reg_type: input
        data_type: uint16
        access: ro
        comment: "单簇：默认Bit0/Bit1为0；      多簇直流侧并机：若有BCU未能并机成功，发送对应故障位；Bit0：此簇电池压差不满足并机压差要求；Bit1：默认发0；"
        bits:
          0: "模组压差超限"
          1: "允许切入超时"
      - address: 8201
        name: "Rack未启动切入原因"
        reg_type: input
        data_type: uint16
        access: ro
        bits:
          0: "模组压差超限"
          1: "Type1报警未全部解除"
          2: "绝缘报警未解除"
          3: "不满足充电条件的切入失败"
          4: "不满足放电条件的切入失败"
          5: "CriticalAlarm   严重告警未全解除"
